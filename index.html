<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variety Show Mission Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-stone-100 text-stone-800 font-serif p-6">

    <div class="max-w-md mx-auto space-y-6">
        <header class="text-center border-b-2 border-stone-300 pb-4">
            <h1 class="text-3xl font-bold uppercase tracking-widest">The Mission Hub</h1>
            <p class="text-sm italic">Upload your CSV to start the game</p>
        </header>

        <section class="bg-white p-4 rounded-lg shadow-sm border border-stone-200">
            <label class="block text-xs font-bold uppercase text-stone-500 mb-2">Load Custom Missions (.csv)</label>
            <input type="file" id="csv-file" accept=".csv" class="block w-full text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-stone-800 file:text-white hover:file:bg-stone-700 cursor-pointer" />
            <p id="status" class="text-[10px] mt-2 text-stone-400 font-mono">Status: Ready</p>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md border border-stone-200">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="mr-2">🧧</span> Secret Mission
            </h2>
            <div id="mission-card" class="h-48 w-full bg-stone-50 border-2 border-dashed border-stone-300 rounded-xl flex items-center justify-center p-6 text-center mb-4 transition-all">
                <p id="mission-text" class="text-stone-400 italic">Upload a CSV to begin...</p>
            </div>
            <button onclick="generateMission()" id="draw-btn" disabled class="w-full bg-stone-300 text-white py-3 rounded-md transition cursor-not-allowed font-bold">DRAW MISSION</button>
        </section>

        <section class="bg-red-50 p-6 rounded-lg shadow-md border border-red-200">
            <h2 class="text-xl font-bold text-red-800 mb-4 flex items-center">
                <span class="mr-2">💥</span> Penalty Box
            </h2>
            <div id="penalty-display" class="hidden mb-4 p-4 bg-white border-2 border-red-500 rounded-md text-center animate-pulse">
                <p id="penalty-text" class="font-black text-red-600 uppercase tracking-tighter text-xl"></p>
            </div>
            <button onclick="revealPenalty()" class="w-full bg-red-600 text-white py-3 rounded-md hover:bg-red-700 transition font-bold">DRAW PENALTY</button>
        </section>
    </div>

    <script>
        let missionData = [];
        const penalties = [
            "The Inkiru: Marker mustache for 10 minutes.",
            "The Lemon Face: Eat a lemon wedge, no expression.",
            "The Forehead Flick: Receive one flick from the winner.",
            "The Butler: Fetch the next round of drinks.",
            "The Protagonist: Narrate your life like an anime hero.",
            "The Statue: Stay frozen for 60 seconds."
        ];

        const statusEl = document.getElementById('status');
        const drawBtn = document.getElementById('draw-btn');
        const missionText = document.getElementById('mission-text');

        // Check for existing data on load
        window.onload = () => {
            const savedMissions = localStorage.getItem('variety_missions');
            if (savedMissions) {
                missionData = JSON.parse(savedMissions);
                enableGame(`Status: Restored ${missionData.length} missions from memory.`);
            }
        };

        function enableGame(statusMsg) {
            statusEl.innerText = statusMsg;
            drawBtn.disabled = false;
            drawBtn.classList.remove('bg-stone-300', 'cursor-not-allowed');
            drawBtn.classList.add('bg-stone-800', 'hover:bg-stone-700');
            missionText.innerText = "Ready to draw!";
        }

        // Handle CSV Upload
        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    missionData = results.data;
                    // Persist to LocalStorage
                    localStorage.setItem('variety_missions', JSON.stringify(missionData));
                    enableGame(`Status: Loaded ${missionData.length} missions.`);
                },
                error: function(err) {
                    statusEl.innerText = "Status: Error parsing CSV.";
                }
            });
        });

        function generateMission() {
            if (missionData.length === 0) return;
            const m = missionData[Math.floor(Math.random() * missionData.length)];
            
            const category = m.Category || "Misc";
            const task = m['Mission Description'] || "No description found.";
            const diff = m.Difficulty || "Unknown";

            missionText.innerHTML = `
                <div class="space-y-2 animate-in fade-in duration-500">
                    <span class="px-2 py-1 bg-stone-200 text-[10px] rounded uppercase font-bold tracking-widest">${category} - ${diff}</span>
                    <p class="text-lg text-stone-900 font-bold leading-tight">${task}</p>
                </div>
            `;
        }

        function revealPenalty() {
            const p = penalties[Math.floor(Math.random() * penalties.length)];
            const display = document.getElementById('penalty-display');
            document.getElementById('penalty-text').innerText = p;
            display.classList.remove('hidden');
        }

        // Optional: Clear storage function if you want to swap lists
        function resetApp() {
            localStorage.removeItem('variety_missions');
            location.reload();
        }
    </script>
</body>
</html>
