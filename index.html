<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variety Show Mission Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .back { backface-visibility: hidden; transform: rotateY(180deg); }
        .front { backface-visibility: hidden; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-serif p-6">

    <div class="max-w-md mx-auto space-y-8">
        <header class="text-center border-b-2 border-stone-300 pb-4">
            <h1 class="text-3xl font-bold uppercase tracking-widest">The Mission Hub</h1>
            <p class="text-sm italic">Variety Show Edition: Don't Get Got</p>
        </header>

        <section class="bg-white p-6 rounded-lg shadow-md border border-stone-200">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="mr-2">🧧</span> Draw a Secret Mission
            </h2>
            <div id="mission-card" class="h-40 w-full bg-stone-50 border-2 border-dashed border-stone-300 rounded-xl flex items-center justify-center p-4 text-center cursor-pointer mb-4">
                <p id="mission-text" class="text-stone-500 italic font-bold">Tap to reveal your mission...</p>
            </div>
            <button onclick="generateMission()" class="w-full bg-stone-800 text-white py-3 rounded-md hover:bg-stone-700 transition">New Mission</button>
        </section>

        <section class="bg-red-50 p-6 rounded-lg shadow-md border border-red-200">
            <h2 class="text-xl font-bold text-red-800 mb-4 flex items-center">
                <span class="mr-2">💥</span> The Penalty Box (Batsu)
            </h2>
            <div id="penalty-display" class="hidden mb-4 p-4 bg-white border-2 border-red-500 rounded-md text-center animate-bounce">
                <p id="penalty-text" class="font-black text-red-600 uppercase tracking-tighter text-xl"></p>
            </div>
            <button onclick="revealPenalty()" class="w-full bg-red-600 text-white py-3 rounded-md hover:bg-red-700 transition">Draw a Penalty</button>
        </section>

        <footer class="text-center text-xs text-stone-400 pt-8">
            <p>Remember: If they ask "Is that a mission?", you MUST tell the truth.</p>
        </footer>
    </div>

    <script>
        const missions = [
            { cat: "Food", task: "Get someone to order a 'Zebra Mocha' from you.", diff: "Med" },
            { cat: "Volleyball", task: "Get three people to 'rotate' in a circle with you.", diff: "Hard" },
            { cat: "Anime", task: "Get someone to strike a DBZ power-up pose.", diff: "Hard" },
            { cat: "Anime", task: "Win a debate by saying 'Original Japanese is better'.", diff: "Easy" },
            { cat: "Cafe", task: "Convince someone a store-bought snack was homemade.", diff: "Hard" },
            { cat: "Social", task: "Get someone to moonwalk three steps.", diff: "Med" },
            { cat: "Universal", task: "Get a player to say 'What?' after you say 'Guess what?'", diff: "Easy" }
        ];

        const penalties = [
            "The Inkiru: Marker mustache for 10 minutes.",
            "The Lemon Face: Eat a lemon wedge, no expression.",
            "The Forehead Flick: Recieve one flick from the winner.",
            "The Butler: Fetch the next round of drinks.",
            "The Protagonist: Narrate your life like an anime hero."
        ];

        function generateMission() {
            const m = missions[Math.floor(Math.random() * missions.length)];
            document.getElementById('mission-text').innerHTML = `
                <span class="text-xs uppercase text-stone-400">[${m.cat} - ${m.diff}]</span><br>
                <span class="text-lg text-stone-900">${m.task}</span>
            `;
        }

        function revealPenalty() {
            const p = penalties[Math.floor(Math.random() * penalties.length)];
            const display = document.getElementById('penalty-display');
            document.getElementById('penalty-text').innerText = p;
            display.classList.remove('hidden');
        }
    </script>
</body>
</html>
